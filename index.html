<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>三択スイッチ支援ツール</title>

<style>
html,body{
 margin:0;height:100%;overflow:hidden;background:#000;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 -webkit-user-select:none;user-select:none;
}

#container{
 display:flex;
 width:100vw;
 height:100vh;
}

.choice{
 flex:1;
 display:flex;
 align-items:center;
 justify-content:center;
 overflow:hidden;
 transition:.2s; /* スキャン速度に合わせて少し短縮 */
 opacity:.25;
 filter:brightness(40%);
}

.choice img{
 width:100%;
 height:100%;
 object-fit:contain;
 pointer-events:none;
}

.active{
 opacity:1;
 filter:brightness(100%);
 outline:12px solid yellow;
 transform:scale(1.02);
 z-index:10;
}

#settingsBtn{
 position:fixed;
 top:10px;
 right:10px;
 z-index:1000;
 width:60px;
 height:60px;
 border-radius:50%;
 border:none;
 font-size:30px;
 cursor:pointer;
}

#restartBtn{
 display:none;
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 z-index:1000;
 font-size:24px;
 padding:16px 32px;
 cursor:pointer;
}

#settings{
 display:none;
 position:fixed;
 inset:0;
 background:#fff;
 color:#000;
 z-index:2000;
 overflow:auto;
 padding:20px;
}

.preview{
 width:120px;
 height:120px;
 object-fit:contain;
 border:1px solid #ccc;
 display:block;
 margin-top:5px;
}

input[type=text],input[type=number]{
 width:100%;
 max-width:300px;
 padding:8px;
}
</style>
</head>

<body>

<button id="settingsBtn">⚙️</button>
<button id="restartBtn">再スタート</button>

<div id="container">
 <div id="left" class="choice"><img id="leftImg"></div>
 <div id="center" class="choice"><img id="centerImg"></div>
 <div id="right" class="choice"><img id="rightImg"></div>
</div>

<div id="settings">
<h2>設定</h2>

<h3>左</h3>
<input type="color" id="leftColor"><br><br>
<input type="file" id="leftFile" accept="image/*"><br><br>
<img id="leftPreview" class="preview">
<input type="text" id="leftSpeech" placeholder="ひだり">

<hr>

<h3>中央</h3>
<input type="color" id="centerColor"><br><br>
<input type="file" id="centerFile" accept="image/*"><br><br>
<img id="centerPreview" class="preview">
<input type="text" id="centerSpeech" placeholder="まんなか">

<hr>

<h3>右</h3>
<input type="color" id="rightColor"><br><br>
<input type="file" id="rightFile" accept="image/*"><br><br>
<img id="rightPreview" class="preview">
<input type="text" id="rightSpeech" placeholder="みぎ">

<hr>

<h3>共通</h3>
<input type="number" id="scanSpeed" min="1" max="20" value="3"> 秒<br><br>

<button id="saveBtn" style="font-size:18px; padding:10px 20px;">保存</button>
<button id="closeBtn" style="font-size:18px; padding:10px 20px;">閉じる（破棄）</button>
</div>

<script>
const choices = ["left", "center", "right"];
const defaults = { leftColor: "#666", centerColor: "#666", rightColor: "#666", scanSpeed: 3 };
let index = 0, timer = null, decided = false;
let audioUnlocked = false;

// 音声読み上げ関数（ブラウザ制限対策含む）
function speak(t) {
  if (!t) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = "ja-JP";
    speechSynthesis.speak(u);
  } catch (e) {
    console.error("Speech error:", e);
  }
}

// ブラウザの音声再生制限を解除するためのダミー再生
function unlockAudio() {
  if (audioUnlocked) return;
  const u = new SpeechSynthesisUtterance("");
  speechSynthesis.speak(u);
  audioUnlocked = true;
}

function getSettings() {
  return JSON.parse(localStorage.getItem("switch3") || "{}");
}

function loadSettings() {
  const s = getSettings();

  for (const k of choices) {
    const color = s[k + "Color"] || defaults[k + "Color"];
    const imgData = s[k + "Image"] || "";
    
    document.getElementById(k).style.backgroundColor = color;
    document.getElementById(k + "Img").src = imgData;
    
    // 設定画面の同期
    document.getElementById(k + "Color").value = color;
    document.getElementById(k + "Preview").src = imgData;
    document.getElementById(k + "Speech").value = s[k + "Speech"] || "";
    document.getElementById(k + "File").value = ""; // ファイル選択をリセット
  }

  scanSpeed.value = s.scanSpeed || defaults.scanSpeed;
  startScan();
}

function startScan() {
  clearInterval(timer);
  decided = false;
  restartBtn.style.display = "none";

  choices.forEach(c => {
    document.getElementById(c).style.display = "flex";
    document.getElementById(c).classList.remove("active");
  });

  index = 0;
  document.getElementById(choices[index]).classList.add("active");

  const speed = parseFloat(scanSpeed.value) || defaults.scanSpeed;
  timer = setInterval(() => {
    if (decided) return;
    document.getElementById(choices[index]).classList.remove("active");
    index = (index + 1) % choices.length;
    document.getElementById(choices[index]).classList.add("active");
  }, speed * 1000);
}

function selectCurrent() {
  // 設定画面が開いているときは無効化
  if (decided || settings.style.display === "block") return;
  decided = true;
  clearInterval(timer);
  unlockAudio();

  const s = getSettings();
  const key = choices[index];

  choices.forEach(c => {
    if (c !== key) document.getElementById(c).style.display = "none";
  });

  // 音声テキストが空ならプレースホルダーの文字をデフォルトにする
  const defaultSpeech = { left: "ひだり", center: "まんなか", right: "みぎ" };
  const text = s[key + "Speech"] || defaultSpeech[key];
  speak(text);
  
  restartBtn.style.display = "block";
}

// 画面クリック・タップでの決定
document.body.onclick = e => {
  if (["settingsBtn", "restartBtn"].includes(e.target.id)) return;
  if (settings.contains(e.target)) return; // 設定画面内のクリックは無視
  selectCurrent();
};

// キーボード（外部スイッチ）での決定対応 (Space or Enter)
document.addEventListener("keydown", e => {
  if (e.key === " " || e.key === "Enter") {
    if (settings.style.display === "block") return; // 設定画面時は無効
    e.preventDefault();
    if (decided) {
      startScan(); // 決定済みの状態なら再スタート
    } else {
      selectCurrent(); // スキャン中なら決定
    }
  }
});

// ファイルが選択されたらプレビューに即時反映
choices.forEach(k => {
  document.getElementById(k + "File").onchange = async e => {
    const f = e.target.files[0];
    if (f) {
      const base64 = await resizeAndToBase64(f, 400); // 最大400pxにリサイズ
      document.getElementById(k + "Preview").src = base64;
    }
  };
});

// 画像をリサイズしてBase64にする関数（localStorage容量制限対策）
function resizeAndToBase64(file, maxSize) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width;
        let h = img.height;
        if (w > h) {
          if (w > maxSize) { h *= maxSize / w; w = maxSize; }
        } else {
          if (h > maxSize) { w *= maxSize / h; h = maxSize; }
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.7)); // 圧縮率70%のJPEGにする
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

settingsBtn.onclick = () => settings.style.display = "block";
closeBtn.onclick = () => {
  settings.style.display = "none";
  loadSettings(); // 変更を破棄して再読み込み
};
restartBtn.onclick = (e) => {
  e.stopPropagation();
  startScan();
};

saveBtn.onclick = async () => {
  const s = { scanSpeed: scanSpeed.value };
  const currentSettings = getSettings();

  for (const k of choices) {
    s[k + "Color"] = document.getElementById(k + "Color").value;
    s[k + "Speech"] = document.getElementById(k + "Speech").value;

    // プレビュー画像（リサイズ済みSrc）をそのまま取得して保存
    const previewSrc = document.getElementById(k + "Preview").src;
    if (previewSrc && previewSrc.startsWith("data:image")) {
      s[k + "Image"] = previewSrc;
    } else {
      s[k + "Image"] = currentSettings[k + "Image"] || "";
    }
  }

  localStorage.setItem("switch3", JSON.stringify(s));
  loadSettings();
  settings.style.display = "none";
};

// 初期化
loadSettings();
</script>

</body>
</html>
