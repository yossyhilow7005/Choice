<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>スイッチ二択</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

#container {
  display: flex;
  width: 100vw;
  height: 100vh;
}

.choice {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0.35;
  transition: all 0.4s;
}

#left { background: #1e90ff; }
#right { background: #ff4757; }

.choice.active {
  opacity: 1;
  outline: 12px solid yellow;
}

.choice.selected {
  flex: 2;
  opacity: 1;
}
</style>
</head>

<body>

<div id="container">
  <div id="left" class="choice"></div>
  <div id="right" class="choice"></div>
</div>

<script>
const choices = [
  document.getElementById("left"),
  document.getElementById("right")
];

let current = 0;
let decided = false;

const scan = setInterval(() => {
  if (decided) return;
  choices.forEach(c => c.classList.remove("active"));
  choices[current].classList.add("active");
  current = (current + 1) % 2;
}, 3000);

document.addEventListener("touchstart", e => {
  e.preventDefault();
  if (decided) return;
  decided = true;
  clearInterval(scan);
  const selected = (current + 1) % 2;
  choices[selected].classList.add("selected");
}, { passive:false });
</script>

</body>
</html>
